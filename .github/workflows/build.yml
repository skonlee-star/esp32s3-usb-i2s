name: Build ESP32-S3 UAC Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ESP-IDF v5.3
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32s3
          command: |
            idf.py build

            echo "==== 빌드된 .bin 파일 목록 ===="
            ls -la build/*.bin

            APP_BIN=$(ls build/*.bin | grep -v bootloader | grep -v partition | head -n 1)
            echo "앱 바이너리: $APP_BIN"
            
            python3 $IDF_PATH/components/esptool_py/esptool/esptool.py \
              --chip esp32s3 \
              merge_bin \
              -o build/esp32s3_uac_pcm5102_MERGED.bin \
              --flash_mode qio \
              --flash_size 4MB \
              0x0     build/bootloader/bootloader.bin \
              0x8000  build/partition_table/partition-table.bin \
              0x10000 "$APP_BIN"
              
              echo "==== Merged binary 생성 완료 ===="
              ls -lh build/esp32s3_uac_pcm5102_MERGED.bin
            
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-uac-pcm5102-firmware
          path: |
            build/esp32s3_uac_pcm5102_MERGED.bin
            build/esp32s3-usb-i2s.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          retention-days: 90
